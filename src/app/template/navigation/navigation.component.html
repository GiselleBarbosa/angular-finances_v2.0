<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <mat-toolbar routerLink="/" color="primary" class="title-content">
      <svg class="icon icon-account_balance">
        <use xlink:href="./assets/svg/icons.svg#icon-account_balance"></use>
      </svg>

      Finances</mat-toolbar
    >

    <mat-nav-list>
      <a mat-list-item routerLink="user"><p class="white">User Panel</p></a>
      <a mat-list-item routerLink="admin"><p>Admin Panel</p> </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar class="header" color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async"
      >
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>

      <div class="icons">
        <svg class="icon" routerLink="auth/login">
          <use xlink:href="./assets/svg/icons.svg#icon-enter"></use>
        </svg>

        <svg class="icon" routerLink="auth/logout">
          <use xlink:href="./assets/svg/icons.svg#icon-exit"></use>
        </svg>
      </div>
    </mat-toolbar>

    <div class="router-outlet">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
<app-footer />
